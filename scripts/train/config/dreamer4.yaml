defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: true

# --- Run ---
output_model_name: dreamer4_${wm.phase}
subdir: imagination_complete_3
seed: 0

# --- Data ---
dataset_name: pusht_expert_train_v2
cache_dir: null
image_size: 128

batch_size: 24
num_workers: 4
train_split: 1.0
frameskip: 1

# --- World model ---
wm:
  phase: imagination_training       # tokenizer | dynamics | agent_finetune
  horizon: 32
  patch: 4

  # ── Tokenizer architecture (must match trained checkpoint!) ───
  d_model_tok: 256
  n_heads_tok: 4
  depth_tok: 8
  n_latents: 128
  d_bottleneck: 32
  time_every_tok: 1

  mae_p_min: 0.0
  mae_p_max: 0.9

  lpips_weight: 0.2
  lpips_frac: 0.5
  lpips_net: alex

  
  d_model_dyn: 512
  n_heads_dyn: 4
  n_kv_heads_dyn: 2          # GQA: set to e.g. 2 for 4 query heads; null = standard MHA (recommended for small models)
  depth_dyn: 8
  time_every_dyn: 4
  qk_norm: true                # QKNorm on Q/K per head; helps at large scale, can slow convergence at small scale
  packing_factor: 2
  n_register: 4
  n_agent: 1                   # was 0 in Phase 2; new agent token for Phase 3
  space_mode: wm_agent_isolated

  dropout: 0.0
  mlp_ratio: 4.0
  scale_pos_embeds: false

  # ── Shortcut forcing ───────────────────────────────────────────
  k_max: 8
  self_fraction: 0.25
  bootstrap: true
  schedule: shortcut
  eval_d: 0.25

  # ── Task conditioning (agent_finetune only) ────────────────────
  num_tasks: 1

  # ── Context corruption (inference rollouts, paper §3.2) ───────
  ctx_noise: 0.1               # mix fraction of Gaussian noise into past tokens

  # ── Reward & policy heads ──────────────────────────────────────
  mlp_dim: 256
  num_bins: 101
  vmin: -1.2        # reward head bins (per-step rewards fit here)
  vmax: 0.1
  value_vmin: -5.0  # value head bins; symexp(-5)≈-147 covers long-horizon λ-returns
  mtp_length: 8                # L in eq. 9 of the paper
  reward_coef: 1.0
  policy_coef: 1.0
  policy_log_std_init: -1.0    # initial log σ for Gaussian policy (~0.37 std)
  discount: 0.99

  encoding:
    pixels: 0

  # ── Checkpoints ───────────────────────────────────────────────
  tokenizer_ckpt: /snfs2/luizfacury/datasets/weighted_95_2/dreamer4_tokenizer_epoch_5_object.ckpt
  dynamics_ckpt: /snfs2/luizfacury/datasets/dynamics_complete/dreamer4_dynamics_epoch_4_object.ckpt
  agent_finetune_ckpt: /snfs2/luizfacury/datasets/agent_complete/dreamer4_agent_finetune_epoch_6_object.ckpt

  # Lower LR for finetuning. If unset, falls back to optimizer.lr.
  finetune_lr: 3.0e-5

  imagination_horizon: 10
  # lambda for TD lambda-returns (eq. 10); 0.95 follows standard DreamerV3 choice.
  lambda_return: 0.95
  # gamma for imagination discount (eq. 10); paper uses 0.997.
  imagination_discount: 0.97

  value_ema_decay: 0.98

  # PMPO coefficients (eq. 11): Alpha weights D+ vs D-, Beta weights the KL term.
  pmpo_alpha: 0.5
  pmpo_beta: 0.3

# --- Optimizer ---
optimizer:
  type: AdamW
  lr: 3.0e-4
  weight_decay: 1.0e-2

# --- Trainer ---
trainer:
  max_epochs: 8
  strategy: ddp
  devices: auto
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

wandb:
  enable: true
  project: stable-wm
  entity: null

dump_object: true
