defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: true

# --- Run ---
output_model_name: tdmpc2_output
subdir: null
seed: 1

# --- Data ---
dataset_name: pusht_expert_train_v2
cache_dir: null
batch_size: 256
num_workers: 16
train_split: 0.9
image_size: 64

# --- Planning / MPPI parameters used only during evaluation ---
mpc: true
iterations: 12
num_samples: 1024
num_elites: 64
num_pi_trajs: 256
min_std: 0.01
max_std: 0.1
temperature: 0.5

# --- World Model ---
wm:
  horizon: 5
  mlp_dim: 384
  enc_dim: 256
  simnorm_dim: 8
  num_q: 5
  rho: 0.5
  tau: 0.01
  consistency_coef: 20.0
  reward_coef: 0.1
  value_coef: 0.1
  discount: 0.99
  uncertainty_penalty: 0.5
  entropy_coef: 1e-4
  name: tdmpc2

  # Reward Scales
  # reacher: r=-dist ∈[-0.44,0], worst-case Q symlog≈-3.7
  # tworoom: r=-dist/260 ∈[-1,0],  worst-case Q symlog≈-4.2
  # vmin=-5 covers both; vmax=2 buffers early-training Q drift above 0.
  num_bins: 101
  vmin: -5
  vmax: 2

  # --- DYNAMIC ENCODING ---
  # Add modalities as needed (e.g., proprio, state, pixels etc.)
  encoding:
    observation: 128

# --- Optimizer ---
optimizer:
  type: AdamW
  lr: 3e-4
enc_lr_scale: 0.3

# --- Trainer ---
trainer:
  max_epochs: 250
  strategy: auto
  devices: 1
  accelerator: gpu
  precision: 16-mixed
  gradient_clip_val: 20.0

goal_gamma: 0.99

goal_probabilities:
  random: 0.2
  geometric_future: 0.6
  uniform_future: 0.1
  current: 0.1

# --- Logging ---
wandb:
  enable: True
  project: swm
  entity: swm
